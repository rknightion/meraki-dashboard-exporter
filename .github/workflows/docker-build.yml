name: Build and Push Docker Images

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  merge_group:
    types: [checks_requested]
  release:
    types: [published]
  workflow_call:
    inputs:
      release_tag:
        description: >-
          Release tag (e.g. v0.30.1) to publish semver + latest image tags for.
          Set by release-please's docker-release job. When invoked via
          workflow_call the github context is the caller's push/main event, so
          the semver tags cannot be derived from the git ref and must be passed
          in explicitly.
        type: string
        required: false
        default: ''

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

permissions:
  contents: read

jobs:
  # --------------------------------------------------------------------------- #
  # Build each platform on a NATIVE runner (no QEMU emulation) and push by
  # digest. Emulated arm64 builds resolved the wrong-architecture wheels for
  # native extensions (e.g. pydantic_core), producing broken arm64 images
  # (see issue #221). Native runners let uv resolve the correct per-arch wheels.
  # --------------------------------------------------------------------------- #
  build:
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Prepare platform pair
        run: |
          platform="${{ matrix.platform }}"
          echo "PLATFORM_PAIR=${platform//\//-}" >> "$GITHUB_ENV"

      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      # Login against the GitHub Container Registry to push image digests
      - name: Log into registry ${{ env.REGISTRY }}
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Login to Docker Hub for base image pulls (avoid anonymous rate limits)
      - name: Log in to Docker Hub
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Build and push by digest only. The manifest list is assembled in the
      # merge job. provenance/sbom buildkit attestations are disabled here
      # because they create extra manifests that complicate digest-based
      # manifest merging; supply-chain attestation is generated on the final
      # multi-arch index in the merge job instead.
      #
      # On merge_group (merge-queue) events we build both architectures as a
      # validation gate but do NOT push - this is what catches arch-specific
      # build breakage (e.g. issue #221) before it reaches main, without
      # publishing throwaway queue tags.
      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          outputs: ${{ github.event_name != 'merge_group' && format('type=image,name={0}/{1},push-by-digest=true,name-canonical=true,push=true', env.REGISTRY, env.IMAGE_NAME) || 'type=cacheonly' }}
          # Per-platform caches so the two architectures never share layers/wheels
          cache-from: |
            type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache-${{ env.PLATFORM_PAIR }}
            type=gha,scope=${{ env.PLATFORM_PAIR }}
          cache-to: |
            type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache-${{ env.PLATFORM_PAIR }},mode=max
            type=gha,scope=${{ env.PLATFORM_PAIR }},mode=max
          provenance: false
          sbom: false
          build-args: |
            PY_VERSION=3.14

      - name: Export digest
        if: github.event_name != 'merge_group'
        run: |
          mkdir -p "${{ runner.temp }}/digests"
          digest="${{ steps.build.outputs.digest }}"
          touch "${{ runner.temp }}/digests/${digest#sha256:}"

      - name: Upload digest
        if: github.event_name != 'merge_group'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: digests-${{ env.PLATFORM_PAIR }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  # --------------------------------------------------------------------------- #
  # Merge per-arch digests into a single multi-arch manifest list, then sign,
  # attest, generate an SBOM, and scan the published index.
  # --------------------------------------------------------------------------- #
  merge:
    runs-on: ubuntu-latest
    needs: build
    # merge_group runs are validation-only (the build job does not push), so
    # there are no digests to assemble into a manifest list.
    if: github.event_name != 'merge_group'
    permissions:
      contents: read
      packages: write
      # Used for signing and attestation
      id-token: write
      attestations: write
      # Required for uploading scan results to Security tab
      security-events: write

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Download digests
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          cosign-release: 'v2.2.4'

      - name: Install Syft
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # Branch + commit-sha tags (push to main)
            type=ref,event=branch
            type=sha,prefix={{branch}}-,enable={{is_default_branch}}
            # Semver tags from a direct git tag push (v*)
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            # Semver tags when invoked by release-please via workflow_call: the
            # github ref is main, so the version is supplied from inputs.release_tag
            type=semver,pattern={{version}},value=${{ inputs.release_tag }},enable=${{ inputs.release_tag != '' }}
            type=semver,pattern={{major}}.{{minor}},value=${{ inputs.release_tag }},enable=${{ inputs.release_tag != '' }}
            type=semver,pattern={{major}},value=${{ inputs.release_tag }},enable=${{ inputs.release_tag != '' }}
            # 'latest' on a direct v* tag push OR a release-please invocation
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') || inputs.release_tag != '' }}

      - name: Log into registry ${{ env.REGISTRY }}
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create manifest list and push
        working-directory: ${{ runner.temp }}/digests
        run: |
          # shellcheck disable=SC2046  # intentional word-splitting of -t flags and digest refs
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf "${REGISTRY}/${IMAGE_NAME}@sha256:%s " *)
        env:
          REGISTRY: ${{ env.REGISTRY }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}

      - name: Inspect image and capture digest
        id: digest
        run: |
          digest=$(docker buildx imagetools inspect \
            "${REGISTRY}/${IMAGE_NAME}:${VERSION}" \
            --format '{{json .Manifest.Digest}}' | tr -d '"')
          echo "digest=${digest}" >> "$GITHUB_OUTPUT"
          docker buildx imagetools inspect "${REGISTRY}/${IMAGE_NAME}:${VERSION}"
        env:
          REGISTRY: ${{ env.REGISTRY }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          VERSION: ${{ steps.meta.outputs.version }}

      # Generate and attach SBOM for the published multi-arch index
      - name: Generate SBOM
        run: |
          for tag in $(echo "${STEPS_META_OUTPUTS_TAGS}" | tr ',' '\n'); do
            # Extract just the tag part after the last slash and replace colons with dashes
            tag_name=$(echo "${tag##*/}" | tr ':' '-')
            syft "${tag}@${DIGEST}" \
              --output "spdx-json=${tag_name}-sbom.spdx.json"
          done
        env:
          STEPS_META_OUTPUTS_TAGS: ${{ steps.meta.outputs.tags }}
          DIGEST: ${{ steps.digest.outputs.digest }}

      - name: Upload SBOM artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sbom-${{ github.sha }}
          path: '*-sbom.spdx.json'
          retention-days: 30

      # Sign the published image digest.
      - name: Sign the published Docker image
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
          DIGEST: ${{ steps.digest.outputs.digest }}
        run: echo "${TAGS}" | xargs -I {} cosign sign --yes {}@${DIGEST}

      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.digest.outputs.digest }}
          push-to-registry: true

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.digest.outputs.digest }}
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Build summary
        if: always()
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Platforms** | linux/amd64, linux/arm64 (native runners) |" >> $GITHUB_STEP_SUMMARY
          echo "| **Tags** | ${STEPS_META_OUTPUTS_TAGS} |" >> $GITHUB_STEP_SUMMARY
          if [[ "${STEPS_DIGEST_OUTPUTS_DIGEST}" != "" ]]; then
            echo "| **Digest** | \`${STEPS_DIGEST_OUTPUTS_DIGEST}\` |" >> $GITHUB_STEP_SUMMARY
          fi
        env:
          STEPS_META_OUTPUTS_TAGS: ${{ steps.meta.outputs.tags }}
          STEPS_DIGEST_OUTPUTS_DIGEST: ${{ steps.digest.outputs.digest }}
