name: Release Please

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Minimal default; write scopes are granted per-job only where needed.
permissions:
  contents: read

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # create release + tag
      pull-requests: write  # open/maintain the release PR
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5
        id: release
        with:
          # PAT (not GITHUB_TOKEN): bot-authored release PRs need a non-default-token author for CI to run without manual approval
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  prepend-release-warning:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Prepend limited-testing warning to release notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.release-please.outputs.tag_name }}
        run: |
          set -euo pipefail
          warning=$(cat <<'EOF'
          > [!WARNING]
          > I no longer have access to a Meraki network with anything other than MT, MR & MS devices. Changes affecting other device types (MX, MG, MV) are best-effort and driven from publicly available API documentation and SDK references rather than tested against live hardware.
          > If you are willing to work with myself to boost support for other device types or add coverage please reach out!
          EOF
          )
          current_body=$(gh release view "$TAG" --repo "$GITHUB_REPOSITORY" --json body --jq .body)
          printf '%s\n\n%s' "$warning" "$current_body" \
            | gh release edit "$TAG" --repo "$GITHUB_REPOSITORY" --notes-file -

  docker-release:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    permissions:
      contents: write
      packages: write
      id-token: write
      attestations: write
      security-events: write
    uses: ./.github/workflows/publish.yml
    with:
      # Pass the release tag so publish can emit semver + latest image tags
      # (the workflow_call github context is the caller's push/main event).
      release_tag: ${{ needs.release-please.outputs.tag_name }}
    secrets:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

  # Edge build on every non-release push to main: publishes :main multi-arch image
  # + a main-snapshot Helm chart (replaces the removed docker-build.yml push:main path).
  # release_created gates this vs docker-release, so they never both run on one push.
  edge:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created != 'true' }}
    permissions:
      contents: write
      packages: write
      id-token: write
      attestations: write
      security-events: write
    uses: ./.github/workflows/publish.yml
    with:
      release_tag: ""
    secrets:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
