name: Release Please

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Minimal default; write scopes are granted per-job only where needed.
permissions:
  contents: read

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # create release + tag
      pull-requests: write  # open/maintain the release PR
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  prepend-release-warning:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Prepend limited-testing warning to release notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.release-please.outputs.tag_name }}
        run: |
          set -euo pipefail
          warning=$(cat <<'EOF'
          > [!WARNING]
          > **Limited testing.** I no longer have access to a Meraki network with anything other than MT (sensor) devices. Changes affecting other device types (MS, MR, MX, MG, MV) are best-effort — vibecoded from publicly available API documentation and SDK references rather than tested against live hardware.
          EOF
          )
          current_body=$(gh release view "$TAG" --repo "$GITHUB_REPOSITORY" --json body --jq .body)
          printf '%s\n\n%s' "$warning" "$current_body" \
            | gh release edit "$TAG" --repo "$GITHUB_REPOSITORY" --notes-file -

  docker-release:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
      security-events: write
    uses: ./.github/workflows/docker-build.yml # zizmor: ignore[secrets-inherit] local trusted same-repo reusable workflow
    secrets: inherit # zizmor: ignore[secrets-inherit] switch to explicit secrets once docker-build.yml declares workflow_call.secrets (in-flight refactor)
