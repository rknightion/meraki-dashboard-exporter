name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1'  # Weekly on Monday at 6am UTC

permissions:
  contents: read
  pull-requests: read

jobs:
  test:
    runs-on: ubuntu-latest
    # Fork PRs don't receive repo secrets, so CODECOV_TOKEN/CODACY_PROJECT_TOKEN are empty on
    # them. codecov-action soft-fails on a missing token, but codacy-coverage-reporter-action
    # hard-errors (its uploader script requires a non-empty token), which would otherwise fail
    # this required job for every external contributor. The `secrets` context isn't available in
    # step-level `if:` conditions, so resolve availability into job-level env vars here (env IS
    # available at step-level `if:`) and gate the upload steps below on those.
    env:
      HAS_CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN != '' }}
      HAS_CODACY_TOKEN: ${{ secrets.CODACY_PROJECT_TOKEN != '' }}

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      # Ultra-fast dependency install & caching
      - name: Set up uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          python-version: "3.14"
          activate-environment: true
          enable-cache: true

      - name: Install project (incl. dev extras)
        # --locked: fail if uv.lock is stale vs pyproject.toml (e.g. a version bump that
        # forgot to re-lock). release-please-lock.yml keeps the release PR's lock in sync.
        run: uv sync --locked

      - name: Lint (ruff)
        run: |
          uv run ruff check .
          uv run ruff format --check .

      - name: Type-check (mypy)
        run: uv run mypy .

      - name: Meraki model conformance (offline, vs vendored spec)
        env:
          PYTHONPATH: src:tools
        run: |
          uv run python -m apidrift \
            --baseline spec/meraki-openapi.json.gz \
            --live spec/meraki-openapi.json.gz \
            --src src --conformance-only --format md

      - name: Run tests
        env:
          PYTHONPATH: src
        run: uv run pytest --cov=meraki_dashboard_exporter --cov-report=xml --cov-fail-under=80

      - name: Upload coverage
        if: success() && env.HAS_CODECOV_TOKEN == 'true'
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: rknightion/meraki-dashboard-exporter
          files: coverage.xml

      - name: Upload coverage to Codacy
        if: success() && env.HAS_CODACY_TOKEN == 'true'
        uses: codacy/codacy-coverage-reporter-action@89d6c85cfafaec52c72b6c5e8b2878d33104c699 # v1.3.0
        with:
          project-token: ${{ secrets.CODACY_PROJECT_TOKEN }}
          coverage-reports: coverage.xml

  docker-build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Build and test Docker image (amd64 only)
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          platforms: linux/amd64
          push: false
          load: true
          tags: meraki-dashboard-exporter:test
          cache-from: type=gha
          build-args: |
            PY_VERSION=3.14
            APP_VERSION=${{ github.sha }}
            GIT_COMMIT=${{ github.sha }}

      - name: Test Docker image startup
        env:
          MERAKI_EXPORTER_MERAKI__API_KEY: "00000000000000000000000000000000deadbeef"
        run: |
          # Test that the image can start and show help
          docker run --rm -e MERAKI_EXPORTER_MERAKI__API_KEY meraki-dashboard-exporter:test --help

          # Test image metadata
          docker inspect meraki-dashboard-exporter:test | jq '.[0].Config.Labels'

          # Verify non-root user. Overrides the image ENTRYPOINT (which is
          # `python docker-entrypoint.py`, so a bare trailing `whoami` arg
          # would otherwise just be ignored and never actually run) so this
          # genuinely execs `whoami` and asserts an exact match on the
          # expected runtime user, instead of grepping startup log output
          # for the substring "exporter" (which passes even when running as
          # root, since the exporter's own package/module paths contain it).
          actual_user="$(docker run --rm --entrypoint whoami meraki-dashboard-exporter:test)"
          if [ "${actual_user}" != "exporter" ]; then
            echo "::error::Container runs as '${actual_user}', expected non-root user 'exporter'"
            exit 1
          fi
          echo "Verified container runs as non-root user: ${actual_user}"

          # Cross-check against the image's declared config user too.
          configured_user="$(docker inspect -f '{{.Config.User}}' meraki-dashboard-exporter:test)"
          if [ "${configured_user}" != "exporter" ]; then
            echo "::error::Image Config.User is '${configured_user}', expected 'exporter'"
            exit 1
          fi

      - name: Install container-structure-test
        run: |
          # renovate: datasource=github-releases depName=GoogleContainerTools/container-structure-test
          CST_VERSION=1.22.1
          mkdir -p "${RUNNER_TEMP}/bin"
          curl -sSfL "https://github.com/GoogleContainerTools/container-structure-test/releases/download/v${CST_VERSION}/container-structure-test-linux-amd64" \
            -o "${RUNNER_TEMP}/bin/container-structure-test"
          chmod +x "${RUNNER_TEMP}/bin/container-structure-test"
          echo "${RUNNER_TEMP}/bin" >> "${GITHUB_PATH}"

      - name: Container structure test (entrypoint, port, non-root user, required files)
        run: |
          container-structure-test test \
            --image meraki-dashboard-exporter:test \
            --config .github/container-structure-test.yaml

      - name: Serve smoke test (container up, GET /health + /metrics respond)
        env:
          MERAKI_EXPORTER_MERAKI__API_KEY: "00000000000000000000000000000000deadbeef"
          # Pin an org so startup skips the single-org auto-select getOrganizations
          # call (#585); an unpinned key would fail-fast at boot without live API.
          MERAKI_EXPORTER_MERAKI__ORG_ID: "123456"
        run: |
          container_id="$(docker run -d --rm -p 9099:9099 -e MERAKI_EXPORTER_MERAKI__API_KEY -e MERAKI_EXPORTER_MERAKI__ORG_ID meraki-dashboard-exporter:test)"
          echo "Started container ${container_id}"

          cleanup() {
            echo "::group::container logs"
            docker logs "${container_id}" || true
            echo "::endgroup::"
            docker stop "${container_id}" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT

          check_endpoint() {
            path="$1"
            status=000
            for attempt in $(seq 1 30); do
              status="$(curl -s -o /dev/null -w '%{http_code}' "http://localhost:9099${path}" || echo 000)"
              if [ "${status}" = "200" ]; then
                echo "${path} responded 200 on attempt ${attempt}"
                return 0
              fi
              sleep 2
            done
            echo "::error::${path} did not return 200 after retries (last status: ${status})"
            return 1
          }

          check_endpoint "/health"
          check_endpoint "/metrics"

  helm-lint-kubeconform:
    name: helm-lint-kubeconform
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Helm
        run: |
          # renovate: datasource=github-releases depName=helm/helm
          HELM_VERSION=4.2.2
          mkdir -p "${RUNNER_TEMP}/bin"
          curl -sSfL "https://get.helm.sh/helm-v${HELM_VERSION}-linux-amd64.tar.gz" -o /tmp/helm.tar.gz
          tar -xzf /tmp/helm.tar.gz -C /tmp
          install -m 0755 /tmp/linux-amd64/helm "${RUNNER_TEMP}/bin/helm"
          echo "${RUNNER_TEMP}/bin" >> "${GITHUB_PATH}"

      - name: Install kubeconform
        run: |
          # renovate: datasource=github-releases depName=yannh/kubeconform
          KUBECONFORM_VERSION=0.8.0
          mkdir -p "${RUNNER_TEMP}/bin" /tmp/kubeconform
          curl -sSfL "https://github.com/yannh/kubeconform/releases/download/v${KUBECONFORM_VERSION}/kubeconform-linux-amd64.tar.gz" \
            -o /tmp/kubeconform.tar.gz
          tar -xzf /tmp/kubeconform.tar.gz -C /tmp/kubeconform
          install -m 0755 /tmp/kubeconform/kubeconform "${RUNNER_TEMP}/bin/kubeconform"
          echo "${RUNNER_TEMP}/bin" >> "${GITHUB_PATH}"

      - name: Helm lint
        run: helm lint charts/meraki-dashboard-exporter --set meraki.apiKey=dummy

      - name: Render chart templates
        # serviceMonitor.enabled defaults to false, so the rendered set is core-API-only
        # (Deployment/Service/ConfigMap/Secret/ServiceAccount) — no Prometheus Operator CRD
        # schema is needed for kubeconform below.
        run: |
          helm template test-release charts/meraki-dashboard-exporter \
            --set meraki.apiKey=dummy \
            > "${RUNNER_TEMP}/rendered-manifests.yaml"

      - name: kubeconform validate rendered manifests
        run: |
          kubeconform -summary -strict -ignore-missing-schemas "${RUNNER_TEMP}/rendered-manifests.yaml"

  slow-tests:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.14'
          allow-prereleases: true
      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
      - name: Install dependencies
        run: uv sync --all-extras --locked
      - name: Run slow tests
        # No test is currently marked `slow` (the marker is registered in pyproject.toml for
        # future use), so pytest exits 5 ("no tests collected") every week and this job has been
        # perpetually red (#595). Exit 5 is not a test failure — treat it the same as success;
        # any other non-zero exit (an actual failure/error) still fails the job.
        run: |
          set +e
          uv run pytest -m slow -v --timeout=300
          status=$?
          set -e
          if [ "${status}" -eq 5 ]; then
            echo "No tests marked 'slow' were collected — treating as success, not a failure."
            exit 0
          fi
          exit "${status}"

  # Single required status check (the branch ruleset requires only this). if: always() + an explicit
  # failure check so a failed/cancelled leg fails the gate; the schedule-only slow-tests job isn't
  # depended on. Renovate automerge waits for this to go green.
  ci-success:
    name: ci-success
    runs-on: ubuntu-latest
    if: always()
    needs: [test, docker-build-test, helm-lint-kubeconform]
    steps:
      - name: Fail if any required job did not pass
        if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}
        run: |
          echo "A required job failed or was cancelled: ${{ join(needs.*.result, ', ') }}"
          exit 1
      - name: All required jobs passed
        run: echo "ci-success — ${{ join(needs.*.result, ', ') }}"
