name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1'  # Weekly on Monday at 6am UTC

permissions:
  contents: read
  pull-requests: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      # Ultra-fast dependency install & caching
      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: "3.14"
          activate-environment: true
          enable-cache: true

      - name: Install project (incl. dev extras)
        # --locked: fail if uv.lock is stale vs pyproject.toml (e.g. a version bump that
        # forgot to re-lock). release-please-lock.yml keeps the release PR's lock in sync.
        run: uv sync --locked

      - name: Type-check (mypy)
        run: uv run mypy .

      - name: Meraki model conformance (offline, vs vendored spec)
        env:
          PYTHONPATH: src:tools
        run: |
          uv run python -m apidrift \
            --baseline spec/meraki-openapi.json.gz \
            --live spec/meraki-openapi.json.gz \
            --src src --conformance-only --format md

      - name: Run tests
        env:
          PYTHONPATH: src
        run: uv run pytest --cov=meraki_dashboard_exporter --cov-report=xml --cov-fail-under=80

      - name: Upload coverage
        if: success()
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: rknightion/meraki-dashboard-exporter
          files: coverage.xml

      - name: Upload coverage to Codacy
        if: success()
        uses: codacy/codacy-coverage-reporter-action@89d6c85cfafaec52c72b6c5e8b2878d33104c699 # v1.3.0
        with:
          project-token: ${{ secrets.CODACY_PROJECT_TOKEN }}
          coverage-reports: coverage.xml

  docker-build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Build and test Docker image (amd64 only)
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          platforms: linux/amd64
          push: false
          load: true
          tags: meraki-dashboard-exporter:test
          cache-from: type=gha
          build-args: |
            PY_VERSION=3.14

      - name: Test Docker image startup
        env:
          MERAKI_EXPORTER_MERAKI__API_KEY: "00000000000000000000000000000000deadbeef"
        run: |
          # Test that the image can start and show help
          docker run --rm -e MERAKI_EXPORTER_MERAKI__API_KEY meraki-dashboard-exporter:test --help

          # Test image metadata
          docker inspect meraki-dashboard-exporter:test | jq '.[0].Config.Labels'

          # Verify non-root user. Overrides the image ENTRYPOINT (which is
          # `python docker-entrypoint.py`, so a bare trailing `whoami` arg
          # would otherwise just be ignored and never actually run) so this
          # genuinely execs `whoami` and asserts an exact match on the
          # expected runtime user, instead of grepping startup log output
          # for the substring "exporter" (which passes even when running as
          # root, since the exporter's own package/module paths contain it).
          actual_user="$(docker run --rm --entrypoint whoami meraki-dashboard-exporter:test)"
          if [ "${actual_user}" != "exporter" ]; then
            echo "::error::Container runs as '${actual_user}', expected non-root user 'exporter'"
            exit 1
          fi
          echo "Verified container runs as non-root user: ${actual_user}"

          # Cross-check against the image's declared config user too.
          configured_user="$(docker inspect -f '{{.Config.User}}' meraki-dashboard-exporter:test)"
          if [ "${configured_user}" != "exporter" ]; then
            echo "::error::Image Config.User is '${configured_user}', expected 'exporter'"
            exit 1
          fi

  slow-tests:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.14'
          allow-prereleases: true
      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      - name: Install dependencies
        run: uv sync --all-extras --locked
      - name: Run slow tests
        run: uv run pytest -m slow -v --timeout=300

  # Single required status check (the branch ruleset requires only this). if: always() + an explicit
  # failure check so a failed/cancelled leg fails the gate; the schedule-only slow-tests job isn't
  # depended on. Renovate automerge waits for this to go green.
  ci-success:
    name: ci-success
    runs-on: ubuntu-latest
    if: always()
    needs: [test, docker-build-test]
    steps:
      - name: Fail if any required job did not pass
        if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}
        run: |
          echo "A required job failed or was cancelled: ${{ join(needs.*.result, ', ') }}"
          exit 1
      - name: All required jobs passed
        run: echo "ci-success — ${{ join(needs.*.result, ', ') }}"
