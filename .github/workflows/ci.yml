name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1'  # Weekly on Monday at 6am UTC

permissions:
  contents: read
  pull-requests: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2.18.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      # Ultra-fast dependency install & caching
      - name: Set up uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          python-version: "3.14"
          activate-environment: true
          enable-cache: true

      - name: Install project (incl. dev extras)
        run: uv sync

      - name: Type-check (mypy)
        run: uv run mypy .

      - name: Run tests
        env:
          PYTHONPATH: src
        run: uv run pytest --cov=meraki_dashboard_exporter --cov-report=xml --cov-fail-under=80

      - name: Upload coverage
        if: success()
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: rknightion/meraki-dashboard-exporter
          files: coverage.xml

  docker-build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2.18.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Build and test Docker image (amd64 only)
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          platforms: linux/amd64
          push: false
          load: true
          tags: meraki-dashboard-exporter:test
          cache-from: type=gha
          build-args: |
            PY_VERSION=3.14

      - name: Test Docker image startup
        env:
          MERAKI_EXPORTER_MERAKI__API_KEY: "00000000000000000000000000000000deadbeef"
        run: |
          # Test that the image can start and show help
          docker run --rm -e MERAKI_EXPORTER_MERAKI__API_KEY meraki-dashboard-exporter:test --help

          # Test image metadata
          docker inspect meraki-dashboard-exporter:test | jq '.[0].Config.Labels'

          # Verify non-root user
          docker run --rm -e MERAKI_EXPORTER_MERAKI__API_KEY meraki-dashboard-exporter:test whoami | grep -q exporter

  slow-tests:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.14'
          allow-prereleases: true
      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
      - name: Install dependencies
        run: uv sync --all-extras
      - name: Run slow tests
        run: uv run pytest -m slow -v --timeout=300
