name: publish

on:
  workflow_call:
    inputs:
      release_tag:
        description: "vX.Y.Z to publish; empty = edge :main build"
        required: false
        type: string
        default: ""
    secrets:
      DOCKERHUB_USERNAME:
        required: false
      DOCKERHUB_TOKEN:
        required: false
  workflow_dispatch:
    inputs:
      release_tag:
        description: "vX.Y.Z to publish; empty = edge :main test"
        required: false
        type: string
        default: ""
  # Build-only validation gate on the merge queue: the reusable builds both arches
  # WITHOUT pushing (catches arch-specific Python wheel breakage before main — issue #221).
  merge_group:

# Minimal top-level default; write scopes granted per-job only.
permissions:
  contents: read

jobs:
  image:
    permissions:
      contents: write
      packages: write
      id-token: write
      attestations: write
      security-events: write
    uses: rknightion/.github/.github/workflows/container-publish.yml@f31690684f4292d1fe8e528618f7c8306fe27d9a # v1.3.1
    with:
      release-tag: ${{ inputs.release_tag }}
      helm-chart-path: charts/meraki-dashboard-exporter
      build-args: |
        PY_VERSION=3.14
        APP_VERSION=${{ inputs.release_tag || github.sha }}
        GIT_COMMIT=${{ github.sha }}
      dockerhub-login: true
    secrets:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
