# Starter Prometheus alert rules for meraki-dashboard-exporter (#569).
#
# This is a Prometheus Operator `PrometheusRule` custom resource. If you are not
# running the Prometheus Operator, lift the `spec.groups` list into a plain
# `rule_files` entry instead (it is valid Prometheus recording/alerting-rule YAML
# either way - only the `apiVersion`/`kind`/`metadata` envelope is Operator-specific).
#
# This file is the single source of truth for the rule content: the Helm chart
# template `charts/meraki-dashboard-exporter/templates/prometheusrule.yaml` embeds
# the SAME rules (gated behind `prometheusRule.enabled`, default false). Keep the
# two in sync by hand when editing either.
#
# `for:` durations are taken verbatim from the "Recommended alert `for:` durations"
# table in docs/data-freshness.md - that table is the source of truth; if you change
# a duration here, change it there too (and vice versa). Every metric/label name
# below is verified against core/constants/metrics_constants.py (*MetricName enums)
# and core/metrics.py (LabelName) as of the #618 v1-readiness program.
#
# Substitute `job="meraki-dashboard-exporter"` below with whatever `job` label your
# scrape config / ServiceMonitor actually produces if it differs.
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: meraki-dashboard-exporter-rules
  labels:
    app.kubernetes.io/name: meraki-dashboard-exporter
    # Many kube-prometheus-stack installs only pick up PrometheusRules carrying
    # this label - add/adjust to match your Prometheus's ruleSelector.
    release: prometheus
spec:
  groups:
    # ------------------------------------------------------------------
    # Exporter self-health & liveness
    # ------------------------------------------------------------------
    - name: meraki-exporter-self-health
      rules:
        - alert: MerakiExporterDown
          expr: up{job="meraki-dashboard-exporter"} == 0
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Meraki exporter target is down"
            description: >-
              Prometheus has not been able to scrape {{ $labels.instance }} for
              5 minutes. No Meraki metrics are being refreshed at all while this
              fires.

        - alert: MerakiExporterFastCollectorStale
          # MTSensorCollector is the only FAST-tier (60s) collector - see
          # docs/data-freshness.md "What runs on each tier". Staleness threshold
          # (180s = 3 missed cycles) + `for: 3m` mirrors the "MT sensor threshold
          # breach" FAST-tier row (2m-3m).
          expr: time() - meraki_exporter_collector_success_timestamp_seconds{tier="fast"} > 180
          for: 3m
          labels:
            severity: warning
          annotations:
            summary: "FAST-tier collector ({{ $labels.collector }}) has not succeeded recently"
            description: >-
              {{ $labels.collector }} (tier=fast) has had no successful collection
              in over 3 minutes. MT sensor readings are stale.

        - alert: MerakiExporterMediumCollectorStale
          # MEDIUM tier (300s default): DeviceCollector, NetworkHealthCollector,
          # OrganizationCollector, AlertsCollector, MTSensorAlertsCollector, etc.
          # Threshold (900s = 3 missed cycles) + `for: 15m` mirrors the
          # "Organization-level" MEDIUM-tier row.
          expr: time() - meraki_exporter_collector_success_timestamp_seconds{tier="medium"} > 900
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "MEDIUM-tier collector ({{ $labels.collector }}) has not succeeded recently"
            description: >-
              {{ $labels.collector }} (tier=medium) has had no successful
              collection in over 15 minutes. Device/network/org metrics are stale.

        - alert: MerakiExporterCollectorFailureStreak
          expr: meraki_exporter_collector_failure_streak >= 3
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "{{ $labels.collector }} has failed 3+ times in a row"
            description: >-
              Collector {{ $labels.collector }} (tier={{ $labels.tier }}) has
              accumulated {{ $value }} consecutive failures.

    # ------------------------------------------------------------------
    # API rate-limit exhaustion / 429 storms
    # ------------------------------------------------------------------
    - name: meraki-exporter-rate-limiting
      rules:
        - alert: MerakiAPIRateLimiterThrottlingHigh
          # API_RATE_LIMITER_THROTTLED_TOTAL is a genuine monotonic Counter - rate() is correct here.
          expr: sum(rate(meraki_exporter_api_rate_limiter_throttled_total[15m])) > 0.5
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "Meraki API client-side rate limiter is throttling heavily"
            description: >-
              The exporter's own client-side rate limiter has been waiting on
              more than 0.5 requests/sec on average over the last 15 minutes -
              the org-wide request budget is undersized for the current fleet.

        - alert: MerakiSchedulerThrottleBackoffStorm
          # SCHEDULER_THROTTLE_BACKOFFS_TOTAL increments on each AIMD multiplicative-decrease
          # event, i.e. each 429/Retry-After-driven halving of the effective request budget
          # (at most one per 30s cooldown) - repeated increments indicate a genuine 429 storm.
          expr: increase(meraki_exporter_scheduler_throttle_backoffs_total[15m]) > 3
          for: 15m
          labels:
            severity: critical
          annotations:
            summary: "Meraki API is repeatedly returning 429s (adaptive scheduler backing off)"
            description: >-
              The adaptive budget scheduler has halved its effective request
              rate more than 3 times in 15 minutes - the Meraki Dashboard API is
              rate-limiting this org harder than the configured budget allows.

    # ------------------------------------------------------------------
    # Collector failure / backoff and cardinality shedding
    # ------------------------------------------------------------------
    - name: meraki-exporter-collection-health
      rules:
        - alert: MerakiOrgCollectionBackedOff
          # EXPORTER_ORG_COLLECTION_STATUS: 1=success, 0=failed/backed-off (core/org_health.py).
          expr: meraki_exporter_org_collection_status == 0
          for: 15m
          labels:
            severity: critical
          annotations:
            summary: "Organization {{ $labels.org_id }} collection is in backoff"
            description: >-
              Org {{ $labels.org_id }} has been failing/backed-off for over 15
              minutes - all metrics for this org are stale.

        - alert: MerakiCollectorErrorsHigh
          expr: sum by (collector, tier) (increase(meraki_exporter_collector_errors_total[15m])) > 5
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "{{ $labels.collector }} is generating repeated errors"
            description: >-
              Collector {{ $labels.collector }} (tier={{ $labels.tier }}) logged
              more than 5 errors in the last 15 minutes.

        - alert: MerakiCardinalityLimitReached
          # EXPORTER_CARDINALITY_LIMIT_REACHED_TOTAL: increments each cleanup cycle a metric
          # family exceeds cardinality.max_series_per_family. With action=drop, series are
          # actually being shed - worth knowing about even with action=warn (default).
          expr: increase(meraki_exporter_cardinality_limit_reached_total[15m]) > 0
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "Metric family {{ $labels.metric }} has exceeded its cardinality budget"
            description: >-
              {{ $labels.metric }} exceeded cardinality.max_series_per_family in
              the last 15 minutes. With action=drop this means older series for
              this family are being actively shed from the registry.

    # ------------------------------------------------------------------
    # Device availability
    # ------------------------------------------------------------------
    - name: meraki-exporter-device-availability
      rules:
        # Pick ONE of the next two rules to match your webhooks.enabled setting
        # (see docs/getting-started.md) - they alert on the same metric with
        # different `for:` durations per the data-freshness table.

        - alert: MerakiDeviceDown
          # Default assumption: webhooks disabled (poll-path only). MEDIUM-tier
          # row: "meraki_device_up == 0, webhooks disabled" -> for: 12m-15m.
          expr: meraki_device_up == 0
          for: 15m
          labels:
            severity: critical
          annotations:
            summary: "Device {{ $labels.serial }} is offline"
            description: >-
              {{ $labels.model }} ({{ $labels.serial }}) in network
              {{ $labels.network_id }} has been reported offline for over 15
              minutes (poll-path detection, webhooks disabled).

        - alert: MerakiDeviceDownFastPath
          # Use this variant INSTEAD of MerakiDeviceDown if webhooks.enabled=true
          # and device_down/gateway_down alert types are configured to fire
          # webhooks: "meraki_device_up == 0, webhooks enabled" -> for: 3m-5m.
          expr: meraki_device_up == 0
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Device {{ $labels.serial }} is offline (webhook fast path)"
            description: >-
              {{ $labels.model }} ({{ $labels.serial }}) in network
              {{ $labels.network_id }} has been reported offline for over 5
              minutes. Recovery is still poll-paced (up to ~15m) - there is no
              whole-device "back online" webhook type.

    # ------------------------------------------------------------------
    # Network health
    # ------------------------------------------------------------------
    - name: meraki-exporter-network-health
      rules:
        - alert: MerakiWirelessConnectionFailuresHigh
          # MR_SSID_FAILED_CONNECTIONS_COUNT is a windowed count (resets each MEDIUM
          # cycle), NOT a Counter - deliberately no rate()/increase() here, per the
          # #531/#534 contract. Network-health MEDIUM-tier row: for: 10m-15m.
          expr: sum by (network_id) (meraki_mr_ssid_failed_connections_count) > 20
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "High wireless connection failure count in network {{ $labels.network_id }}"
            description: >-
              More than 20 failed wireless connection attempts recorded in
              network {{ $labels.network_id }} over the last hourly window.

    # ------------------------------------------------------------------
    # Product signals: licensing, MT sensors, beta-API risk
    # ------------------------------------------------------------------
    - name: meraki-exporter-product-signals
      rules:
        - alert: MerakiOrgLicensesExpiringSoon
          # OrganizationCollector (via LicenseCollector) is MEDIUM tier -> org-level row: for: 15m.
          expr: meraki_org_licenses_expiring > 0
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "Licenses expiring within 30 days in org {{ $labels.org_id }}"
            description: >-
              {{ $value }} {{ $labels.license_type }} license(s) in org
              {{ $labels.org_id }} are within their 30-day expiry window.

        - alert: MerakiMTWaterDetected
          # MTSensorCollector is FAST tier (raw sensor readings). Binary detector,
          # no site-specific threshold needed. FAST-tier row: for: 2m-3m.
          expr: meraki_mt_water_detected == 1
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: "Water detected by sensor {{ $labels.serial }}"
            description: >-
              MT water sensor {{ $labels.serial }} ({{ $labels.model }}) in
              network {{ $labels.network_id }} has reported water detection for
              over 2 minutes.

        - alert: MerakiMTSensorAlertingActive
          # MT_ALERTING_SENSORS_COUNT is emitted by MTSensorAlertsCollector, which
          # is MEDIUM tier (Meraki's own configured per-sensor alert-profile
          # evaluation, aggregated network+metric) - so this uses the MEDIUM-tier
          # network-health row (for: 10m-15m), NOT the FAST-tier raw-reading row.
          expr: meraki_mt_alerting_sensors_count > 0
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "{{ $labels.metric }} sensors are alerting in network {{ $labels.network_id }}"
            description: >-
              {{ $value }} sensor(s) are currently outside their configured
              {{ $labels.metric }} threshold in network {{ $labels.network_id }}
              (per Meraki's own sensor alert profiles).

        - alert: MerakiOrgHasBetaAPIRiskFlag
          # ORG_HAS_BETA_API (#278/#279): informational risk signal, not an
          # incident - EarlyAccessCollector runs under OrganizationCollector
          # (MEDIUM tier), so this uses the org-level row: for: 15m. Deliberately
          # `severity: info` - opting into the beta API spec is a deliberate,
          # often-desired choice, not necessarily a problem.
          expr: meraki_org_has_beta_api == 1
          for: 15m
          labels:
            severity: info
          annotations:
            summary: "Org {{ $labels.org_id }} has opted into the Meraki beta API spec"
            description: >-
              Org {{ $labels.org_id }} has an active has_beta_api Early Access
              opt-in. Beta API responses can change shape without notice -
              treat this exporter's data for that org as higher-risk of drift.
