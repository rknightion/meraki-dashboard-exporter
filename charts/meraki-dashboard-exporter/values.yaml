  # -- Size of the thread pool used to run the synchronous Meraki SDK off the event loop (the asyncio.to_thread executor). Bounds the number of concurrent blocking SDK calls independently of the per-tier API concurrency limits. (min: 1, max: 100)
  # apiExecutorWorkers: "10"
  # -- Wall-clock deadline (seconds) for a single logical fetch, including all paginated page requests made under total_pages='all'. Sits between the SDK per-request timeout (see 'timeout') and the per-collector timeout so a slow bulk fetch fails fast instead of consuming the whole collector budget. (min: 1, max: 600)
  # apiPerFetchDeadlineSeconds: "120"
  # -- Interval for fast-moving data (sensors) in seconds (min: 30, max: 300)
  # updateIntervalFast: "60"
  # -- Interval for medium-moving data (device metrics) in seconds (min: 300, max: 1800)
  # updateIntervalMedium: "300"
  # -- Interval for slow-moving data (configuration) in seconds (min: 600, max: 3600)
  # updateIntervalSlow: "900"
  # -- Host to bind the exporter to
  # serverHost: "0.0.0.0"
  # -- When false, sensitive GET UI/status endpoints return 404 (metrics/health/ready stay open).
  # serverUiEnabled: "true"
  # -- Enable webhook receiver endpoint
  # webhooksEnabled: "false"
  # -- Require shared secret validation (disable for testing only)
  # webhooksRequireSecret: "true"
  # -- Explicit opt-in to run the webhook receiver enabled without require_secret; startup refuses the insecure combo unless this is true.
  # webhooksAllowInsecure: "false"
  # -- Maximum webhook payload size in bytes (min: 1024, max: 10485760)
  # webhooksMaxPayloadSize: "1048576"
  # -- Enable OpenTelemetry tracing
  # otelEnabled: "false"
