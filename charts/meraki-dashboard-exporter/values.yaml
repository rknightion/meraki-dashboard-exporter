# Default values for meraki-dashboard-exporter.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# -- Number of replicas. **Must stay 1.** The exporter is a singleton: it has no
# leader election, so every running pod independently scrapes the Meraki API on the
# same schedule. A second replica does NOT share load -- it doubles the outbound API
# request rate against the per-org 10 req/s budget and produces a duplicate, competing
# set of metrics. The chart hard-`fail`s the render if replicaCount > 1 (unless
# autoscaling is enabled, which is itself discouraged -- see `autoscaling` below).
replicaCount: 1

# -- Deployment update strategy. Forced to `Recreate` so the old pod is torn down
# before the new one starts: because the exporter is a single-writer with no leader
# election, a `RollingUpdate` would briefly run two pods at once during a rollout,
# doubling API load and emitting duplicate metrics. Do not change this to
# RollingUpdate without adding leader election first.
strategy:
  type: Recreate

image:
  # -- Container image repository
  repository: ghcr.io/rknightion/meraki-dashboard-exporter
  # -- Image pull policy
  pullPolicy: IfNotPresent
  # -- Overrides the image tag whose default is the chart appVersion.
  tag: ""

# -- Secrets used to pull images from private registries
imagePullSecrets: []

# -- Override the chart name
nameOverride: ""
# -- Override the full release name
fullnameOverride: ""

serviceAccount:
  # -- Specifies whether a service account should be created
  create: true
  # -- Annotations to add to the service account
  annotations: {}
  # -- The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template.
  name: ""

# -- Seconds Kubernetes waits after sending SIGTERM before force-killing the pod
# (SIGKILL). SIGTERM triggers the exporter's shutdown handler, but a collector cycle
# already in flight can be blocked inside a synchronous Meraki SDK call running on the
# executor thread pool (see core/config_models.py APISettings) -- those calls are not
# cancellable mid-flight from asyncio. The default here (150s) is set to comfortably
# exceed the worst realistic single blocked fetch: per_fetch_deadline_seconds (120s,
# the wall-clock cap on one logical fetch including pagination) plus a margin above
# the per-request SDK timeout (single_request_timeout, 30s) so the deadline has time
# to fire and the fetch to unwind before Kubernetes gives up and sends SIGKILL. If you
# raise config.apiPerFetchDeadline (not yet a chart value; set via extraEnv as
# MERAKI_EXPORTER_API__PER_FETCH_DEADLINE_SECONDS) above 120s, raise this value to match
# (per_fetch_deadline_seconds + ~30s margin is a reasonable rule of thumb). See
# docs/deployment-operations.md "Shutdown behaviour" for the full explanation.
terminationGracePeriodSeconds: 150

# -- Annotations to add to the pod
podAnnotations: {}

# -- Labels to add to the pod
podLabels: {}

# -- Pod-level security context
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault

# -- Container-level security context
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  seccompProfile:
    type: RuntimeDefault
  capabilities:
    drop:
      - ALL

service:
  # -- Service type
  type: ClusterIP
  # -- Service port (must match the exporter's server port)
  port: 9099

# Ingress (OPTIONAL). Primarily useful for the webhook receiver
# (`config.webhooksEnabled: true`, POST /api/webhooks/meraki): Meraki only delivers
# alert webhooks over HTTPS, and the exporter itself serves plain HTTP, so an ingress
# (or an external nginx/Traefik) is the recommended TLS-termination point in front of
# it. Terminate TLS at the ingress and forward HTTP to the Service. See
# docs/deployment-operations.md for full nginx/Traefik/ingress TLS examples.
# NOT recommended for exposing /metrics publicly -- scrape it in-cluster instead.
ingress:
  # -- Enable an Ingress resource.
  enabled: false
  # -- IngressClass name (e.g. "nginx", "traefik"). Leave "" to use the cluster default.
  className: ""
  # -- Annotations for the Ingress (put cert-manager / TLS-termination hints here).
  annotations: {}
  # -- Ingress host rules. Each host maps one or more paths to the Service http port.
  hosts:
    - host: meraki-exporter.example.com
      paths:
        - path: /
          pathType: Prefix
  # -- TLS configuration. Meraki requires HTTPS for webhook delivery, so populate this
  # (or terminate TLS at an upstream LB) when exposing the webhook receiver.
  tls: []
  #  - secretName: meraki-exporter-tls
  #    hosts:
  #      - meraki-exporter.example.com

# Meraki API credentials
meraki:
  # -- Meraki Dashboard API key. If set, a Secret will be created automatically.
  # Mutually exclusive with existingSecret.
  apiKey: ""
  # -- Name of an existing Secret containing the API key.
  # Mutually exclusive with apiKey.
  existingSecret: ""
  # -- Key within the existing Secret that holds the API key value.
  existingSecretKey: "api-key"  # pragma: allowlist secret
  # -- Meraki organization ID. Leave empty to collect metrics from all accessible organizations.
  organizationId: ""

# Application configuration (maps to MERAKI_EXPORTER_* environment variables)
config:
  # -- Log level. One of DEBUG, INFO, WARNING, ERROR, CRITICAL.
  logLevel: "INFO"
  # -- Meraki API base URL. Change for regional endpoints (e.g. China).
  apiBaseUrl: "https://api.meraki.com/api/v1"
  # -- API request timeout in seconds.
  apiTimeout: "30"
  # -- Maximum concurrent API requests.
  apiConcurrencyLimit: "5"
  # -- Maximum retries for failed API requests.
  apiMaxRetries: "3"
  # -- Fast update interval in seconds (sensors, real-time metrics).
  updateIntervalFast: "60"
  # -- Medium update interval in seconds (device metrics).
  updateIntervalMedium: "300"
  # -- Slow update interval in seconds (configuration, inventory).
  updateIntervalSlow: "900"
  # -- Timeout for individual collector runs in seconds. Leave empty ("") to
  # inherit the application's own default (currently 240s) instead of pinning
  # a chart-specific value that can drift from it.
  collectorTimeout: ""
  # -- Enable webhook receiver endpoint.
  webhooksEnabled: "false"
  # -- Enable OpenTelemetry tracing.
  otelEnabled: "false"
  # -- OpenTelemetry collector endpoint (OTLP gRPC). Required when otelEnabled is true.
  otelEndpoint: ""
  # -- OpenTelemetry service name.
  otelServiceName: "meraki-dashboard-exporter"

# -- Resource requests and limits.
#
# SIZING GUIDANCE (read before deploying to anything larger than a lab). Memory is
# the binding constraint and scales with Prometheus series cardinality, which scales
# with device/network count -- NOT with a fixed value. The defaults below (256Mi
# request / 512Mi limit) are sized for a SMALL deployment only
# (~1 org / ~10 networks / ~100 devices, registry ~20-50k series, RSS < 256Mi).
# The old "512Mi is enough" advice is WRONG at scale and will OOMKill the pod.
#
# Rough tiers (single org; clients collector OFF; from evidence/scale-and-capacity.md):
#   SMALL   (~100 devices,   ~10 nets):  requests 100m / 256Mi,  limits 500m / 512Mi
#   MEDIUM  (~1,000 devices, ~50 nets):  requests 250m / 512Mi,  limits 1    / 1Gi
#   LARGE   (~5,000 devices, ~500 nets): requests 500m / 1.5Gi,  limits 2    / 3Gi+
# LARGE also exceeds the per-org API budget with current defaults (~178% of 10 req/s)
# and needs NetworkFilter + interval tuning regardless of pod size -- more memory does
# not fix rate-limit starvation. Registry can hold 0.6-1.1M series at LARGE, so set the
# limit from observed RSS (watch `process_resident_memory_bytes` / container memory) and
# leave generous headroom rather than trusting these estimates. Turning the clients
# collector ON raises cardinality and memory substantially -- size up further.
resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

# Horizontal Pod Autoscaler (OPTIONAL, and UNUSUAL for this exporter).
#
# The exporter is a single-writer singleton with NO leader election, so scaling
# *replicas* beyond 1 is unsupported: extra pods duplicate API load and metrics
# rather than sharing work (see `replicaCount` above). This HPA is provided only for
# operators who want Kubernetes to manage the *single* pod against a CPU/memory target
# -- hence `maxReplicas` defaults to 1, which keeps the singleton contract intact while
# still letting the HPA surface utilisation. Do NOT raise `maxReplicas` above 1 unless
# you have added leader election; doing so reintroduces the double-scrape problem.
# When `enabled: true`, the Deployment omits its static `replicas` so the HPA owns it.
autoscaling:
  # -- Enable a HorizontalPodAutoscaler for the (single) pod.
  enabled: false
  # -- Minimum replicas. Keep at 1 (singleton).
  minReplicas: 1
  # -- Maximum replicas. Keep at 1 unless leader election has been added -- see note above.
  maxReplicas: 1
  # -- Target average CPU utilisation percentage (omit by setting to null to disable).
  targetCPUUtilizationPercentage: 80
  # -- Target average memory utilisation percentage (null/unset to disable).
  targetMemoryUtilizationPercentage: null

# Liveness probe configuration
livenessProbe:
  # -- Enable liveness probe
  enabled: true
  httpGet:
    path: /health
    port: http
  # -- Number of seconds after container start before first probe
  initialDelaySeconds: 30
  # -- Probe interval in seconds
  periodSeconds: 30
  # -- Probe timeout in seconds
  timeoutSeconds: 10
  # -- Number of consecutive successes required
  successThreshold: 1
  # -- Number of consecutive failures before pod is restarted
  failureThreshold: 3

# Readiness probe configuration
readinessProbe:
  # -- Enable readiness probe
  enabled: true
  httpGet:
    # -- /ready returns 200 once the FAST+MEDIUM collector tiers have completed
    # their first cycle, and 503 until then, so Kubernetes only routes traffic
    # once the exporter has real data. Do not point this at /health (which is
    # always 200) or the readiness gate becomes a no-op.
    path: /ready
    port: http
  # -- Number of seconds after container start before first probe. Kept small
  # because /ready itself gates on collector state -- there's no need to guess
  # how long a full cycle takes. A large org can legitimately take minutes to
  # complete its first cycle; the pod will just report not-ready (and be left
  # out of Service endpoints) until then, which is the desired behaviour and
  # will not restart the pod (readinessProbe failures never trigger a restart,
  # only livenessProbe does -- see livenessProbe above, which stays on /health).
  initialDelaySeconds: 15
  # -- Probe interval in seconds
  periodSeconds: 10
  # -- Probe timeout in seconds
  timeoutSeconds: 5
  # -- Number of consecutive successes required
  successThreshold: 1
  # -- Number of consecutive failures before pod is removed from endpoints
  failureThreshold: 3

# -- Node selector for pod scheduling
nodeSelector: {}

# -- Tolerations for pod scheduling
tolerations: []

# -- Affinity rules for pod scheduling
affinity: {}

# -- Extra Envs
# extraEnv:
#  - name: MERAKI_EXPORTER_COLLECTORS__COLLECTOR_TIMEOUT
#    value: "100"
extraEnv: []

# Prometheus Operator ServiceMonitor
serviceMonitor:
  # -- Enable ServiceMonitor creation (requires Prometheus Operator)
  enabled: false
  # -- Namespace where the ServiceMonitor will be created. Defaults to release namespace.
  namespace: ""
  # -- Additional labels to add to the ServiceMonitor (e.g. for Prometheus selector)
  additionalLabels: {}
  # -- Scrape interval. Should match the exporter's fast update interval.
  interval: "60s"
  # -- Scrape timeout
  scrapeTimeout: "30s"
  # -- Path to scrape
  path: /metrics
  # -- Relabelings to apply to samples before ingestion
  relabelings: []
  # -- MetricRelabelings to apply to samples before ingestion
  metricRelabelings: []
  # -- Honor labels from the scrape target
  honorLabels: false

# NetworkPolicy (OPTIONAL). When enabled, restricts pod traffic to only what the
# exporter needs: inbound scrapes/webhooks on the http port, and outbound DNS + HTTPS
# to the Meraki API (+ the OTLP collector when tracing is on). Requires a CNI that
# enforces NetworkPolicy (Calico, Cilium, etc.).
networkPolicy:
  # -- Enable a NetworkPolicy for the exporter pod.
  enabled: false
  ingress:
    # -- Allow inbound traffic to the http (metrics/webhook) port. Set to false to
    # render an egress-only policy.
    enabled: true
    # -- Sources allowed to reach the http port (Prometheus, ingress controller, etc.).
    # Standard NetworkPolicy `from` peers (namespaceSelector / podSelector / ipBlock).
    # Leave empty to allow from ANY source on the http port (still port-restricted).
    from: []
    #  - namespaceSelector:
    #      matchLabels:
    #        kubernetes.io/metadata.name: monitoring
    #    podSelector:
    #      matchLabels:
    #        app.kubernetes.io/name: prometheus
  egress:
    # -- Allow DNS resolution (UDP+TCP 53) to any destination. Required.
    dns: true
    # -- Allow outbound HTTPS (TCP 443) to any destination -- the Meraki Dashboard API.
    # Meraki has no fixed egress CIDR, so this defaults to all destinations on 443.
    merakiApi: true
    # -- OTLP collector egress port (TCP). Opened only when config.otelEnabled is true.
    # Default 4317 = OTLP/gRPC. Set to your collector's port if different.
    otlpPort: 4317
    # -- Restrict the OTLP egress to specific peers (namespaceSelector/podSelector/
    # ipBlock). Empty = allow the OTLP port to any destination.
    otlpTo: []
    # -- Extra raw egress rules appended verbatim (list of NetworkPolicyEgressRule).
    extraEgress: []
