  # -- Structured-log renderer: 'logfmt' (default) or 'json'.
  # loggingLogFormat: "logfmt"
  # -- Maximum number of retries for API requests (min: 0, max: 10)
  # apiMaxRetries: "3"
  # -- Per-request API timeout in seconds (SDK single_request_timeout). Note this applies to EACH page request, so a total_pages='all' bulk fetch may make many such requests; the overall fetch is additionally bounded by per_fetch_deadline_seconds. Reviewed for large-org bulk fetches (#556): kept at 30s (raise only if large-org page latencies are observed to exceed it). (min: 10, max: 300)
  # apiTimeout: "30"
  # -- Maximum concurrent API requests (global fallback) (min: 1, max: 20)
  # apiConcurrencyLimit: "5"
  # -- Maximum concurrent API requests for FAST tier collectors (min: 1, max: 20)
  # apiConcurrencyLimitFast: "5"
  # -- Maximum concurrent API requests for MEDIUM tier collectors (min: 1, max: 20)
  # apiConcurrencyLimitMedium: "3"
  # -- Maximum concurrent API requests for SLOW tier collectors (min: 1, max: 20)
  # apiConcurrencyLimitSlow: "2"
  # -- Default batch size for API operations (min: 1, max: 100)
  # apiBatchSize: "20"
  # -- Batch size for device operations (min: 1, max: 100)
  # apiDeviceBatchSize: "20"
  # -- Batch size for network operations (min: 1, max: 100)
  # apiNetworkBatchSize: "30"
  # -- Batch size for client operations (e.g., MR client metrics) (min: 1, max: 100)
  # apiClientBatchSize: "20"
  # -- Delay between batches in seconds (min: 0.0, max: 5.0)
  # apiBatchDelay: "0.5"
  # -- Wait time in seconds when rate limited (min: 1, max: 60)
  # apiRateLimitRetryWait: "5"
  # -- Wait time for action batch retries (min: 1, max: 60)
  # apiActionBatchRetryWait: "10"
  # -- When True, the Meraki SDK logs warnings if API methods are called with unrecognized kwargs. Recommended for dev/CI; off by default in production.
  # apiValidateKwargs: "false"
  # -- HTTPS proxy URL for Meraki API requests (SDK requests_proxy); when unset the requests HTTPS_PROXY/NO_PROXY env vars still apply.
  # apiRequestsProxy: ""
  # -- Path to a custom CA bundle for verifying the Meraki API TLS cert (SDK certificate_path); mount into read-only containers as a volume.
  # apiCertificatePath: ""
  # -- Enable client-side rate limiting to smooth API calls
  # apiRateLimitEnabled: "true"
  # -- Target requests per second per organization (min: 1.0, max: 50.0)
  # apiRateLimitRequestsPerSecond: "10.0"
  # -- Token bucket burst capacity per organization (min: 1, max: 100)
  # apiRateLimitBurst: "20"
  # -- Fraction of the org API call budget this exporter is allowed to consume. Defaults to 0.8 so ~20% headroom is left for other consumers of the same org budget (dashboards, other tools, humans); set to 1.0 to claim the whole budget (#550). (min: 0.1, max: 1.0)
  # apiRateLimitSharedFraction: "0.8"
  # -- Jitter ratio applied to client-side rate limiter waits (min: 0.0, max: 0.5)
  # apiRateLimitJitterRatio: "0.1"
  # -- Spread batch work across the collection interval
  # apiSmoothingEnabled: "true"
  # -- Fraction of the collection interval used for smoothing (min: 0.1, max: 1.0)
  # apiSmoothingWindowRatio: "0.8"
  # -- Minimum delay between batches when smoothing (min: 0.0, max: 60.0)
  # apiSmoothingMinBatchDelay: "1.0"
  # -- Maximum delay between batches when smoothing (min: 0.0, max: 300.0)
  # apiSmoothingMaxBatchDelay: "15.0"
  # -- Use org-level switch port status endpoint for MS status metrics
  # apiMsPortStatusUseOrgEndpoint: "true"
  # -- Minimum seconds between per-switch port usage/POE refreshes (min: 0, max: 3600)
  # apiMsPortUsageInterval: "600"
  # -- Minimum seconds between per-switch packet stats refreshes (min: 0, max: 3600)
  # apiMsPacketStatsInterval: "600"
  # -- Minimum seconds between client application usage refreshes (min: 0, max: 3600)
  # apiClientAppUsageInterval: "600"
  # -- Minimum seconds between per-client wireless signal-quality refreshes (min: 0, max: 3600)
  # apiClientSignalQualityInterval: "600"
  # -- Maximum wireless clients queried for signal quality per network per cycle (0 disables the cap). Bounds the sequential per-client API fan-out. (min: 0, max: 5000)
  # apiClientSignalQualityMaxClients: "200"
