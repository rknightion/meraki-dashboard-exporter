  # otelClientKeyPath: ""
  # -- Maximum consecutive failures before alerting (min: 1, max: 100)
  # monitoringMaxConsecutiveFailures: "10"
  # -- Histogram buckets for collector duration metrics
  # monitoringHistogramBuckets: "[0.1, 0.5, 1.0, 2.5, 5.0, 10.0, 30.0, 60.0, 120.0, 300.0]"
  # -- Days before license expiration to start warning (min: 7, max: 90)
  # monitoringLicenseExpirationWarningDays: "30"
  # -- Multiplier for metric TTL (collection_interval * multiplier) (min: 1.0, max: 10.0)
  # monitoringMetricTtlMultiplier: "2.0"
  # -- Maximum number of tracked label sets per collector before shedding oldest (min: 100, max: 1000000)
  # monitoringMaxCardinalityPerCollector: "10000"
  # -- Dead-man switch threshold. /health returns 503 once no collector has completed a successful run within this many seconds, so Kubernetes/Docker restart a wedged exporter instead of leaving it serving stale metrics. 0 (default) auto-derives the threshold from the fastest *enabled* tier's interval (3 x that interval), so a stalled fast loop trips liveness promptly without slower tiers causing false positives. Set a large value to effectively disable. (min: 0, max: 86400)
  # monitoringLivenessMaxStaleSeconds: "0"
  # -- Enabled collector names
  # collectorsEnabledCollectors: "["alerts", "clients", "config", "device", "insight", "mtsensor", "mtsensoralerts", "networkhealth", "organization"]"
  # -- Explicitly disabled collectors (overrides enabled)
  # collectorsDisableCollectors: ""
  # -- Timeout for individual collector runs in seconds (min: 30, max: 600)
  # collectorTimeout: "240"
  # -- Collect per-AP wireless signal quality (RSSI/SNR). Costs ONE API call per selected AP per cycle (hourly cadence; no bulk endpoint exists). Scope the fan-out with ap_signal_quality_tags, or disable entirely.
