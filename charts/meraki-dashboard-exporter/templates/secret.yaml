{{- if .Values.meraki.apiKey }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "meraki-dashboard-exporter.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "meraki-dashboard-exporter.labels" . | nindent 4 }}
type: Opaque
stringData:
  # Maps to MERAKI_EXPORTER_MERAKI__API_KEY inside the container
  MERAKI_EXPORTER_MERAKI__API_KEY: {{ .Values.meraki.apiKey | quote }}
{{- end }}
