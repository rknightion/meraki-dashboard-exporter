{{- if .Values.autoscaling.enabled }}
{{- /*
  HorizontalPodAutoscaler for the (single) exporter pod.

  The exporter is a single-writer singleton with no leader election, so this HPA is
  intended to manage utilisation of ONE pod, not to scale replicas beyond 1
  (autoscaling.maxReplicas is validated == 1 in deployment.yaml). See values.yaml.
*/ -}}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "meraki-dashboard-exporter.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "meraki-dashboard-exporter.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "meraki-dashboard-exporter.fullname" . }}
  minReplicas: {{ .Values.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.autoscaling.maxReplicas }}
  metrics:
    {{- if .Values.autoscaling.targetCPUUtilizationPercentage }}
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.autoscaling.targetCPUUtilizationPercentage }}
    {{- end }}
    {{- if .Values.autoscaling.targetMemoryUtilizationPercentage }}
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: {{ .Values.autoscaling.targetMemoryUtilizationPercentage }}
    {{- end }}
{{- end }}
