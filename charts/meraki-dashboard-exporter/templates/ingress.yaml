{{- if .Values.ingress.enabled }}
{{- /*
  Optional Ingress. Primary use case: TLS-terminating in front of the webhook
  receiver (POST /api/webhooks/meraki), since Meraki only delivers webhooks over
  HTTPS while the exporter serves plain HTTP. Terminate TLS here; forward HTTP to
  the Service. See docs/deployment-operations.md for nginx/Traefik/ingress examples.
*/ -}}
{{- $fullName := include "meraki-dashboard-exporter.fullname" . -}}
{{- $svcPort := .Values.service.port -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ $fullName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "meraki-dashboard-exporter.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- with .Values.ingress.className }}
  ingressClassName: {{ . }}
  {{- end }}
  {{- with .Values.ingress.tls }}
  tls:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  rules:
    {{- range .Values.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            pathType: {{ .pathType | default "Prefix" }}
            backend:
              service:
                name: {{ $fullName }}
                port:
                  number: {{ $svcPort }}
          {{- end }}
    {{- end }}
{{- end }}
